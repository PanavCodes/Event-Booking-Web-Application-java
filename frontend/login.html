<!DOCTYPE html>
<html lang="en" ng-app="eventBookingApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Event Booking System - Access events, book tickets, and manage events.">
    <title>Login — Event Booking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0F0F1A;
            color: #EAEAEA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-orbs {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: floatOrb 8s ease-in-out infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: #6C63FF; top: -100px; left: -100px; }
        .orb-2 { width: 350px; height: 350px; background: #FF6584; bottom: -80px; right: -80px; animation-delay: 2s; }
        .orb-3 { width: 250px; height: 250px; background: #00D2FF; top: 50%; left: 60%; animation-delay: 4s; }
        @keyframes floatOrb {
            to { transform: translate(60px, -40px) scale(1.12); }
        }

        /* ===== LOGIN CARD ===== */
        .login-container {
            position: relative; z-index: 1;
            width: 100%; max-width: 440px;
            padding: 20px;
        }
        .login-card {
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(108, 99, 255, 0.15);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== BRANDING ===== */
        .brand {
            text-align: center;
            margin-bottom: 36px;
        }
        .brand-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #6C63FF, #FF6584);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
            box-shadow: 0 8px 30px rgba(108, 99, 255, 0.35);
        }
        .brand h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .brand p {
            color: #A0A0B8;
            font-size: 14px;
            margin-top: 6px;
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #A0A0B8;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .form-group input[type="email"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #EAEAEA;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-group input:focus {
            border-color: #6C63FF;
            background: rgba(108, 99, 255, 0.06);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
        }
        .form-group input::placeholder {
            color: #555;
        }

        /* ===== ERROR TEXT ===== */
        .error-text {
            color: #E74C5C;
            font-size: 12px;
            margin-top: 6px;
            display: none;
            animation: shake 0.3s ease;
        }
        .error-text.show { display: block; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* ===== BUTTON ===== */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6C63FF, #5A52D5);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108, 99, 255, 0.4);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-login .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            animation: rippleAnim 0.6s ease-out;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            from { width: 0; height: 0; opacity: 1; }
            to { width: 300px; height: 300px; opacity: 0; }
        }

        /* ===== ROLE SELECTOR ===== */
        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }
        .role-option {
            flex: 1;
            position: relative;
        }
        .role-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0; height: 0;
        }
        .role-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #A0A0B8;
            background: rgba(255,255,255,0.02);
            transition: all 0.3s ease;
        }
        .role-option input:checked + label {
            border-color: #6C63FF;
            background: rgba(108,99,255,0.1);
            color: #EAEAEA;
            box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
        }
        .role-option label:hover {
            border-color: rgba(108,99,255,0.4);
        }

        /* ===== HINT ===== */
        .admin-hint {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #555;
            line-height: 1.6;
        }
        .admin-hint strong { color: #6C63FF; }

        /* ===== GLOBAL ERROR ===== */
        .global-error {
            background: rgba(231, 76, 92, 0.1);
            border: 1px solid rgba(231, 76, 92, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #E74C5C;
            display: none;
            animation: slideUp 0.3s ease;
        }
        .global-error.show { display: block; }
    </style>
</head>
<body ng-controller="LoginController">

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">🎫</div>
                <h1>Event Booking</h1>
                <p>Sign in to continue</p>
            </div>

            <div class="global-error" id="globalError"></div>

            <form id="loginForm" novalidate ng-submit="login()">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" ng-model="email">
                    <div class="error-text" id="emailError">Please enter a valid email address</div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" ng-model="password">
                    <div class="error-text" id="passwordError">Password must be at least 4 characters</div>
                </div>

                <div class="form-group">
                    <label style="margin-bottom: 12px;">Login As</label>
                    <div class="role-selector">
                        <div class="role-option">
                            <input type="radio" id="roleUser" name="role" value="user" ng-model="role">
                            <label for="roleUser">👤 User</label>
                        </div>
                        <div class="role-option">
                            <input type="radio" id="roleAdmin" name="role" value="admin" ng-model="role">
                            <label for="roleAdmin">🔧 Admin</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin" ng-click="addRipple($event)" ng-disabled="loading">
                    {{loading ? 'Signing in...' : 'Sign In'}}
                </button>
            </form>

            <div class="admin-hint">
                Admin: <strong>admin@gmail.com</strong> / <strong>admin123</strong><br>
                User: <strong>user@gmail.com</strong> / <strong>admin123</strong>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://139.59.85.16:8080/api";
        fetch(`${API_BASE}/login`, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    email: email,
    password: password,
    role: role
  })
})
        var app = angular.module('eventBookingApp', []);

        app.controller('LoginController', function($scope, $http) {
            // Default values
            $scope.email = '';
            $scope.password = '';
            $scope.role = 'user';
            $scope.loading = false;

            // Validation helper
            function validateEmail(email) {
                var re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }

            // Ripple effect
            $scope.addRipple = function(e) {
                var btn = e.currentTarget;
                var ripple = document.createElement('span');
                ripple.className = 'ripple';
                var rect = btn.getBoundingClientRect();
                ripple.style.left = (e.clientX - rect.left - 150) + 'px';
                ripple.style.top = (e.clientY - rect.top - 150) + 'px';
                btn.appendChild(ripple);
                setTimeout(function() { ripple.remove(); }, 600);
            };

            // Login logic — now calls backend API
            $scope.login = function() {
                var valid = true;

                // Reset errors
                document.getElementById('emailError').classList.remove('show');
                document.getElementById('passwordError').classList.remove('show');
                document.getElementById('globalError').classList.remove('show');

                // Validate email
                if (!$scope.email || !validateEmail($scope.email)) {
                    document.getElementById('emailError').classList.add('show');
                    valid = false;
                }

                // Validate password
                if (!$scope.password || $scope.password.length < 4) {
                    document.getElementById('passwordError').classList.add('show');
                    valid = false;
                }

                if (!valid) return;

                $scope.loading = true;

                // Call backend login API
                $http.post(API_BASE + '/login', {
                    email: $scope.email,
                    password: $scope.password,
                    role: $scope.role
                }).then(function(response) {
                    var data = response.data;
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('userName', data.name);

                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'events.html';
                    }
                }).catch(function(err) {
                    $scope.loading = false;
                    var ge = document.getElementById('globalError');
                    ge.textContent = (err.data && err.data.error) || 'Login failed. Please try again.';
                    ge.classList.add('show');
                });
            };
        });
    </script>
</body>
</html>
