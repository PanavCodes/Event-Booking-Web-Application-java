# ===== Server Port (Railway sets PORT env var) =====
server.port=${PORT:8080}

# ===== MySQL Datasource (Railway MySQL env vars) =====
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:event_booking}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:panav}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== Connection Pool =====
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===== Health Check =====
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ===== Logging =====
logging.level.com.eventbooking=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
